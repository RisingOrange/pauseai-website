name: Visual diff (Chromatic)

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: visual-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Copy environment file
        run: cp template.env .env
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache imagetools transforms
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/imagetools
          key: imagetools-${{ runner.os }}-${{ hashFiles('src/**/*.{png,jpg,jpeg,webp,avif,svg}', 'static/**/*.{png,jpg,jpeg,webp,avif,svg}') }}
          restore-keys: |
            imagetools-${{ runner.os }}-
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright (browser + deps on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Run Playwright tests
        run: pnpm exec playwright test
      - name: Publish to Chromatic
        # Fork PRs can't read repo secrets — skip cleanly instead of failing.
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: chromaui/action@v1
        with:
          playwright: true
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          exitOnceUploaded: true
