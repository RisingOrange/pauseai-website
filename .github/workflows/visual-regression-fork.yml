name: Visual diff (fork PR, gated)

# Runs Chromatic for fork PRs after maintainer approval.
#
# `pull_request_target` exposes repo secrets, so arbitrary fork code must not
# execute unreviewed. The `chromatic-fork` environment (configured in repo
# settings with required reviewers) blocks the job until a maintainer
# approves the run. Only after approval does the fork's code get checked out
# and built.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: visual-regression-fork-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  chromatic:
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    environment: chromatic-fork
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: ./.github/actions/visual-diff
        with:
          chromatic-token: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
